# =============================================================================
# pg_hba.conf - Reglas de autenticación PostgreSQL
# -----------------------------------------------------------------------------
# Principio de menor privilegio: solo conexiones desde la red Docker interna.
# =============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD
# -----------------------------------------------------------------------------
# Local (dentro del contenedor PostgreSQL)
local   all             all                                     peer

# Loopback (localhost dentro del contenedor) - para initdb y healthcheck
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# -----------------------------------------------------------------------------
# Acceso desde la red Docker interna (Synapse se conecta desde aqui)
# Docker Bridge usa tipicamente 172.16.0.0/12 o 172.17.0.0/16
# -----------------------------------------------------------------------------
host    all             synapse_user    172.16.0.0/12           scram-sha-256
host    all             synapse_user    172.17.0.0/16           scram-sha-256
host    all             synapse_user    192.168.0.0/16          scram-sha-256
host    all             synapse_user    10.0.0.0/8              scram-sha-256

# Superuser desde la red Docker (necesario para healthcheck con pg_isready)
host    all             postgres        172.16.0.0/12           scram-sha-256
host    all             postgres        172.17.0.0/16           scram-sha-256
host    all             postgres        127.0.0.1/32            scram-sha-256

# -----------------------------------------------------------------------------
# REJECT todas las demás conexiones
# -----------------------------------------------------------------------------
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject