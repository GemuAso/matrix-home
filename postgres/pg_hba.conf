# =============================================================================
# pg_hba.conf - Reglas de autenticación PostgreSQL
# -----------------------------------------------------------------------------
# Define qué hosts y usuarios pueden conectar y cómo se autentican.
# PRINCIPIO DE MENOR PRIVILEGIO: solo contenedores en la red Docker interna.
# =============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD
# -----------------------------------------------------------------------------
# Local (dentro del contenedor PostgreSQL)
local   all             all                                     peer

# Loopback IPv4 (localhost dentro del contenedor)
host    all             all             127.0.0.1/32            scram-sha-256

# Loopback IPv6 (localhost dentro del contenedor)
host    all             all             ::1/128                 scram-sha-256

# -----------------------------------------------------------------------------
# Acceso desde la red Docker interna (donde están Synapse y otros servicios)
# Rango de IPs de Docker: 172.16.0.0/12 cubre 172.16.x.x a 172.31.x.x
# 192.168.0.0/16 también cubre rangos comunes de Docker
# -----------------------------------------------------------------------------
# Solo el usuario synapse_user puede acceder, solo a la DB synapse
host    synapse         synapse_user    172.16.0.0/12           scram-sha-256
host    synapse         synapse_user    192.168.0.0/16          scram-sha-256
host    synapse         synapse_user    10.0.0.0/8              scram-sha-256

# Repulsión explícita a otras DBs (solo admin puede administrar)
# PostgreSQL ya no permite conexiones fuera del rango anterior, pero
# se documentan las políticas por claridad.

# -----------------------------------------------------------------------------
# REJECT todas las demás conexiones (denegación por defecto)
# -----------------------------------------------------------------------------
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
