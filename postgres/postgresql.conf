# =============================================================================
# postgresql.conf - Configuración PostgreSQL 16 optimizada para Synapse
# -----------------------------------------------------------------------------
# Parámetros tuneados para uso en servidor Matrix (carga mixta OLTP).
# Ajustar shared_buffers y effective_cache_size según RAM del host.
# =============================================================================

# -----------------------------------------------------------------------------
# Conexiones
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100           # Synapse usa pool de conexiones (max 20)
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# Autenticación
# -----------------------------------------------------------------------------
authentication_timeout = 10s
password_encryption = scram-sha-256  # Más seguro que md5

# -----------------------------------------------------------------------------
# Memoria (ajustar según RAM del host)
# -----------------------------------------------------------------------------
# Para host con 4GB RAM: shared_buffers=1GB, effective_cache_size=3GB
# Para host con 8GB RAM: shared_buffers=2GB, effective_cache_size=6GB
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 256MB
autovacuum_work_mem = -1

# -----------------------------------------------------------------------------
# WAL / Checkpoints
# -----------------------------------------------------------------------------
wal_buffers = 16MB
checkpoint_timeout = 5min
max_wal_size = 1GB
min_wal_size = 128MB
checkpoint_completion_target = 0.9
checkpoint_warning = 30s

# -----------------------------------------------------------------------------
# Planner
# -----------------------------------------------------------------------------
random_page_cost = 1.1           # SSD-friendly
effective_io_concurrency = 200   # SSD-friendly
default_statistics_target = 100

# -----------------------------------------------------------------------------
# Comportamiento por defecto
# -----------------------------------------------------------------------------
timezone = 'America/Bogota'
client_encoding = 'UTF8'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# -----------------------------------------------------------------------------
# Replicación
# -----------------------------------------------------------------------------
max_wal_senders = 0              # Sin replicación (instancia única)
wal_keep_size = 0

# -----------------------------------------------------------------------------
# Query tuning
# -----------------------------------------------------------------------------
# Deshabilitar seq scan solo para testing - mantener habilitado en producción
enable_seqscan = on
enable_indexscan = on
enable_indexonlyscan = on

# -----------------------------------------------------------------------------
# Autovacuum (crítico para Synapse - muchas escrituras)
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 1000
autovacuum_vacuum_cost_delay = 5ms

# -----------------------------------------------------------------------------
# Logging (posteriormente capturado por Docker json-file driver)
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off          # Docker captura stderr
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 500  # ms - log queries lentas (>500ms)
log_checkpoints = on
log_connections = off            # demasiado ruido
log_disconnections = off
log_duration = off
log_line_prefix = '%m [%p] %u@%d '
log_lock_waits = on
log_statement = 'none'
log_temp_files = 0
log_timezone = 'America/Bogota'

# -----------------------------------------------------------------------------
# SSL (deshabilitado - tráfico interno entre contenedores)
# -----------------------------------------------------------------------------
ssl = off
# Si se quisiera SSL interno, generar cert y descomentar:
# ssl_cert_file = '/var/lib/postgresql/server.crt'
# ssl_key_file = '/var/lib/postgresql/server.key'

# -----------------------------------------------------------------------------
# Performance y paralelismo
# -----------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# -----------------------------------------------------------------------------
# File locations (por defecto en Alpine)
# -----------------------------------------------------------------------------
data_directory = '/var/lib/postgresql/data'
hba_file = '/etc/postgresql/pg_hba.conf'
ident_file = '/var/lib/postgresql/pg_ident.conf'

# -----------------------------------------------------------------------------
# Cluster settings
# -----------------------------------------------------------------------------
server_version = '16.4'  # informativo, no funcional
