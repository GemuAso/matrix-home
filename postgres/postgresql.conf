# =============================================================================
# postgresql.conf - Configuración PostgreSQL 16 optimizada para Synapse
# -----------------------------------------------------------------------------
# Parametros tuneados para uso en servidor Matrix (carga mixta OLTP).
# Compatible con AMD64 y ARM64 (Raspberry Pi 4).
# =============================================================================

# -----------------------------------------------------------------------------
# Conexiones
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# Autenticación
# -----------------------------------------------------------------------------
authentication_timeout = 10s
password_encryption = scram-sha-256

# -----------------------------------------------------------------------------
# Memoria (valores conservadores para Raspberry Pi 4 con 4/8 GB RAM)
# -----------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 8MB
maintenance_work_mem = 128MB
autovacuum_work_mem = -1

# -----------------------------------------------------------------------------
# WAL / Checkpoints
# -----------------------------------------------------------------------------
wal_buffers = 4MB
checkpoint_timeout = 5min
max_wal_size = 512MB
min_wal_size = 64MB
checkpoint_completion_target = 0.9
checkpoint_warning = 30s

# -----------------------------------------------------------------------------
# Planner
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 100
default_statistics_target = 100

# -----------------------------------------------------------------------------
# Comportamiento por defecto
# -----------------------------------------------------------------------------
timezone = 'America/Bogota'
client_encoding = 'UTF8'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'

# -----------------------------------------------------------------------------
# Replicación
# -----------------------------------------------------------------------------
max_wal_senders = 0
wal_keep_size = 0

# -----------------------------------------------------------------------------
# Query tuning
# -----------------------------------------------------------------------------
enable_seqscan = on
enable_indexscan = on
enable_indexonlyscan = on

# -----------------------------------------------------------------------------
# Autovacuum (critico para Synapse - muchas escrituras)
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 1000
autovacuum_vacuum_cost_delay = 5ms

# -----------------------------------------------------------------------------
# Logging (capturado por Docker json-file driver)
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 500
log_checkpoints = on
log_connections = off
log_disconnections = off
log_duration = off
log_line_prefix = '%m [%p] %u@%d '
log_lock_waits = on
log_statement = 'none'
log_temp_files = 0
log_timezone = 'America/Bogota'

# -----------------------------------------------------------------------------
# SSL (deshabilitado - trafico interno entre contenedores)
# -----------------------------------------------------------------------------
ssl = off

# -----------------------------------------------------------------------------
# Performance y paralelismo (conservador para ARM64)
# -----------------------------------------------------------------------------
max_worker_processes = 2
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_parallel_maintenance_workers = 1

# -----------------------------------------------------------------------------
# File locations
# -----------------------------------------------------------------------------
data_directory = '/var/lib/postgresql/data'
hba_file = '/etc/postgresql/pg_hba.conf'
ident_file = '/var/lib/postgresql/pg_ident.conf'