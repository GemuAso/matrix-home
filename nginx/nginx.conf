# =============================================================================
# nginx.conf - Configuración principal Nginx Reverse Proxy
# -----------------------------------------------------------------------------
# Recibe tráfico LAN (HTTP/HTTPS) y enruta a Synapse o Element.
# Termina TLS con certs auto-firmados generados por scripts/generate-certs.
# =============================================================================

user  nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# -----------------------------------------------------------------------------
# Modulos dinámicos (Alpine)
# -----------------------------------------------------------------------------
load_module /etc/nginx/modules/ngx_http_headers_more_filter_module.so;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    # ---------------------------------------------------------------------------
    # Básicos
    # ---------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;
    server_tokens off;           # No exponer versión de Nginx

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_buffer_size 16k;
    client_max_body_size 100M;     # Suficiente para uploads a Synapse

    # ---------------------------------------------------------------------------
    # Compresión
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # SSL (parámetros globales aplicados a todos los server blocks)
    # ---------------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling off;             # No aplica con self-signed
    ssl_stapling_verify off;

    # OCSP no aplica para self-signed en LAN
    resolver 127.0.0.11 valid=30s;  # Docker DNS
    resolver_timeout 5s;

    # ---------------------------------------------------------------------------
    # Rate limiting
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=matrix_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=matrix_auth:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=matrix_media:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=matrix_conn:10m;

    # ---------------------------------------------------------------------------
    # Real IP (en LAN normalmente no hay proxy adicional)
    # ---------------------------------------------------------------------------
    # set_real_ip_from 192.168.0.0/16;
    # set_real_ip_from 172.16.0.0/12;
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;

    # ---------------------------------------------------------------------------
    # Map para WebSocket upgrade (usado en snippets/proxy-params.conf)
    # ---------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------------------------------------------------------------------------
    # Upstreams (contenedores por nombre)
    # ---------------------------------------------------------------------------
    upstream synapse_backend {
        server synapse:8008;
        keepalive 32;
    }

    upstream element_backend {
        server element:80;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Includes adicionales
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
