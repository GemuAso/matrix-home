# =============================================================================
# matrix.home.arpa.conf - Virtual host para Matrix Synapse
# -----------------------------------------------------------------------------
# Recibe trafico HTTPS para matrix.home.arpa y enruta a Synapse.
# Federacion: completamente deshabilitada. No existe endpoint de federacion.
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP - redirige a HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name matrix.home.arpa;

    # .well-known debe servirse por HTTP tambien (algunos clientes no siguen redirect)
    location /.well-known/matrix/ {
        root /etc/nginx/well-known;
        add_header Access-Control-Allow-Origin "*";
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS - Servidor principal Matrix
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name matrix.home.arpa;

    # Certificados (auto-firmados para LAN)
    ssl_certificate     /etc/nginx/certs/matrix.crt;
    ssl_certificate_key /etc/nginx/certs/matrix.key;

    # Headers de seguridad
    include /etc/nginx/snippets/security-headers.conf;

    # Logs
    access_log /var/log/nginx/matrix-access.log main;
    error_log  /var/log/nginx/matrix-error.log warn;

    # Conexiones simultaneas por IP
    limit_conn matrix_conn 50;

    # -------------------------------------------------------------------------
    # .well-known - delegacion
    # -------------------------------------------------------------------------
    location /.well-known/matrix/client {
        root /etc/nginx/well-known;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Type application/json;
        try_files /matrix/client.json =404;
    }

    location /.well-known/matrix/server {
        root /etc/nginx/well-known;
        add_header Content-Type application/json;
        try_files /matrix/server.json =404;
    }

    # -------------------------------------------------------------------------
    # Client API - /_matrix/client/*
    # -------------------------------------------------------------------------
    location ~ ^/_matrix/client/(.*)$ {
        limit_req zone=matrix_limit burst=50 nodelay;

        # Endpoints de login/registro con rate limit mas estricto
        location ~ ^/_matrix/client/(r0|v3)/(login|register)$ {
            limit_req zone=matrix_auth burst=5 nodelay;
            include /etc/nginx/snippets/proxy-params.conf;
            proxy_pass http://synapse_backend;
        }

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://synapse_backend;
    }

    # -------------------------------------------------------------------------
    # Media API - /_matrix/media/*
    # -------------------------------------------------------------------------
    location ~ ^/_matrix/media/(.*)$ {
        limit_req zone=matrix_media burst=100 nodelay;
        client_max_body_size 100M;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://synapse_backend;
    }

    # -------------------------------------------------------------------------
    # Sync endpoint - conexiones long-polling
    # -------------------------------------------------------------------------
    location ~ ^/_matrix/client/(r0|v3)/sync$ {
        limit_req zone=matrix_limit burst=30 nodelay;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://synapse_backend;
    }

    # -------------------------------------------------------------------------
    # Static / health
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        proxy_pass http://synapse_backend/health;
    }

    # -------------------------------------------------------------------------
    # Root - rechaza cualquier otra ruta (federation esta deshabilitada)
    # -------------------------------------------------------------------------
    location / {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://synapse_backend;
    }
}
