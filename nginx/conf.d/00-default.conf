# =============================================================================
# 00-default.conf - Servidor por defecto (catch-all HTTP/HTTPS)
# -----------------------------------------------------------------------------
# Maneja requests que no matchean ningún server_name y redirige a HTTPS.
# =============================================================================

# -----------------------------------------------------------------------------
# Catch-all HTTP - redirige a HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Healthcheck interno
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Redirección a HTTPS (cualquier otra ruta)
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# Catch-all HTTPS - rechaza requests a dominios no configurados
# -----------------------------------------------------------------------------
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/default.crt;
    ssl_certificate_key /etc/nginx/certs/default.key;

    # Responder 444 (sin respuesta) a dominios no reconocidos
    location / {
        return 444;
    }
}
