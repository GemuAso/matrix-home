# =============================================================================
# element.home.arpa.conf - Virtual host para Element Web
# -----------------------------------------------------------------------------
# Recibe trafico HTTPS para element.home.arpa y enruta a Element.
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP - redirige a HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name element.home.arpa;

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS - Servidor Element Web
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name element.home.arpa;

    # Certificados (auto-firmados para LAN)
    ssl_certificate     /etc/nginx/certs/element.crt;
    ssl_certificate_key /etc/nginx/certs/element.key;

    # Headers de seguridad
    include /etc/nginx/snippets/security-headers.conf;

    # CSP especifico para Element (permite conectar a matrix.home.arpa)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://matrix.home.arpa wss://matrix.home.arpa https://call.element.io; font-src 'self' data:; frame-src 'self' https://call.element.io; object-src 'none'; manifest-src 'self';" always;

    # Logs
    access_log /var/log/nginx/element-access.log main;
    error_log  /var/log/nginx/element-error.log warn;

    # Conexiones simultaneas por IP
    limit_conn matrix_conn 50;

    # Rate limiting general
    limit_req zone=matrix_limit burst=50 nodelay;

    # Tamano maximo
    client_max_body_size 50M;

    # -------------------------------------------------------------------------
    # config.json - no cachear
    # -------------------------------------------------------------------------
    location = /config.json {
        proxy_pass http://element_backend;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # -------------------------------------------------------------------------
    # Todo lo demas a Element
    # -------------------------------------------------------------------------
    location / {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://element_backend;
    }
}
