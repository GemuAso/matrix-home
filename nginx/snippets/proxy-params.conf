# =============================================================================
# proxy-params.conf - Parámetros comunes de proxy reverso
# -----------------------------------------------------------------------------
# Incluir dentro de un bloque location con:
#   include /etc/nginx/snippets/proxy-params.conf;
# -----------------------------------------------------------------------------
# Nota: la directiva map $http_upgrade $connection_upgrade está definida en
# /etc/nginx/nginx.conf (contexto http) y es accesible aquí.
# =============================================================================

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# WebSocket support (Matrix usa WebSocket para algunos endpoints)
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;

# Timeouts
proxy_connect_timeout  60s;
proxy_send_timeout     300s;
proxy_read_timeout     300s;
send_timeout           300s;

# Buffers
proxy_buffering        on;
proxy_buffer_size      128k;
proxy_buffers          4 256k;
proxy_busy_buffers_size 256k;
