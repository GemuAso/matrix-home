# =============================================================================
# security-headers.conf - Headers de seguridad compartidos
# -----------------------------------------------------------------------------
# Incluir con: include /etc/nginx/snippets/security-headers.conf;
# =============================================================================

# HSTS - forzar HTTPS en clientes que ya conectaron
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Prevenir clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevenir MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# Filtro XSS básico
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy
add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;

# COOP/COEP - aislamiento cross-origin
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
add_header Cross-Origin-Resource-Policy "same-site" always;
