# =============================================================================
# nginx.conf - Configuracion Nginx para Element Web
# -----------------------------------------------------------------------------
# Sirve los archivos estaticos de Element con headers de seguridad.
# =============================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=element_limit:10m rate=10r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name element.home.arpa _;

    # Charset
    charset utf-8;

    # Root: archivos estaticos de Element (provistos por imagen base)
    root /usr/share/nginx/html;
    index index.html;

    # Tamano maximo de upload (no aplica a Element, pero defensive)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/element-access.log;
    error_log  /var/log/nginx/element-error.log warn;

    # Compresion
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Cache de archivos estaticos
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://matrix.home.arpa wss://matrix.home.arpa; font-src 'self' data:; frame-src 'self'; object-src 'none'; manifest-src 'self';" always;

    # Config.json - no cachear
    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # index.html - no cachear
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # Archivos estaticos con hash - cache largo
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Fallback SPA
    location / {
        limit_req zone=element_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Healthcheck
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Pagina 404 personalizada
    error_page 404 /index.html;
}
