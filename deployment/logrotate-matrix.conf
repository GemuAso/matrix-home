# =============================================================================
# logrotate-matrix.conf - Rotación de logs del stack Matrix
# -----------------------------------------------------------------------------
# Instala con:
#   sudo cp deployment/logrotate-matrix.conf /etc/logrotate.d/matrix-docker
#
# Rota logs generados por Docker (cuando se usan bind mounts para logs).
# Para logs dentro de contenedores, Docker ya rota con json-file driver.
# =============================================================================

/opt/matrix-docker/nginx/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 deploy deploy
    sharedscripts
    postrotate
        docker exec matrix-nginx nginx -s reopen 2>/dev/null || true
    endscript
}

/opt/matrix-docker/backups/cron.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 deploy deploy
}
